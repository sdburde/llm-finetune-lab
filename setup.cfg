# Setup.cfg for flake8 and other tools

[flake8]
max-line-length = 100
exclude = .git,__pycache__,build,dist,venv
ignore = E203,W503

[tool:pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*

[mypy]
python_version = 3.9
warn_return_any = True
warn_unused_configs = True
ignore_missing_imports = True
