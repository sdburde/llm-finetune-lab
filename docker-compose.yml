# LLM Fine-Tuning Toolkit - Docker Compose (GPU Enabled)
# Works with NVIDIA Driver 570.211.01 (CUDA 12.8)

services:
  # Web UI Service with GPU
  llm-finetuning:
    build:
      context: .
      dockerfile: Dockerfile
    image: llm-fine-tuning:latest
    container_name: llm-finetuning
    
    # GPU Access - CRITICAL
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    
    # NVIDIA runtime
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    
    # Port mapping
    ports:
      - "7860:7860"
    
    # Persistent storage
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./configs:/app/configs
    
    # Auto-restart
    restart: unless-stopped
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
