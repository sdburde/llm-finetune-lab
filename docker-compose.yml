# LLM Fine-Tuning Toolkit - Docker Compose (GPU Enabled)
# Works with NVIDIA Driver 570.211.01 (CUDA 12.8)

services:
  # Web UI Service with GPU
  llm-finetuning:
    image: fine-tunning
    container_name: llm-finetuning
    command: python3 app/gradio_app.py
    ports:
      - "7860:7860"
    environment:
      - GRADIO_SERVER_PORT=7860
      - GRADIO_SERVER_NAME=0.0.0.0
    working_dir: /app
    volumes:
      - ./app:/app/app
      - ./models:/app/models
      - ./data:/app/data
      - ./configs:/app/configs
    restart: unless-stopped
    privileged: true

    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
