version: '3.8'

services:
  # Web UI Service
  llm-finetuning:
    build: .
    image: llm-fine-tuning:latest
    container_name: llm-finetuning
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
    ports:
      - "7860:7860"  # Web UI
      - "8000:8000"  # API server
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./configs:/app/configs
      - ./test_results:/app/test_results
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Test Service (runs once and exits)
  test:
    build: .
    image: llm-fine-tuning:test
    container_name: llm-test
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./test_results:/app/test_results
    command: python scripts/test_alpaca.py
    profiles:
      - test
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # API Server Only
  api-server:
    build: .
    image: llm-fine-tuning:latest
    container_name: llm-api
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    ports:
      - "8001:8000"
    volumes:
      - ./models:/app/models
    command: python3 scripts/infer.py --api
    profiles:
      - api
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
